<div class="container mt-4">

  <h2>Grupos</h2>

  <div class="card mb-4">

    <div class="card-body">

      <div class="row">

        <div class="col-md-8">

          <input
            class="form-control"
            placeholder="Nombre del grupo"
            [(ngModel)]="groupName"
          >

        </div>

        <div class="col-md-4">

          @if(editingGroupId){

            <button
              class="btn btn-warning w-100"
              (click)="updateGroup()"
            >
              Actualizar Grupo
            </button>

          } @else {

            <button
              class="btn btn-success w-100"
              (click)="createGroup()"
            >
              Crear Grupo
            </button>

          }

        </div>

      </div>

    </div>

  </div>

  <table class="table table-striped">

    <thead>

      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>

    </thead>

    <tbody>

      @for(group of groups; track group.id){

        <tr>

          <td>{{group.id}}</td>

          <td>{{group.name}}</td>

          <td>

            <button
              class="btn btn-primary btn-sm me-2"
              (click)="openStudents(group.id)"
            >
              Alumnos
            </button>

            <button
              class="btn btn-warning btn-sm me-2"
              (click)="startEdit(group)"
            >
              Editar
            </button>

            <button
              class="btn btn-danger btn-sm"
              (click)="deleteGroup(group.id)"
            >
              Eliminar
            </button>

          </td>

        </tr>

      }

    </tbody>

  </table>

</div>

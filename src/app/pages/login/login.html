<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card">

        <div class="card-header">
          Gestor Docente
        </div>

        <div class="card-body">

          <input
            class="form-control mb-3"
            placeholder="Correo"
            [(ngModel)]="email"
          >

          <input
            type="password"
            class="form-control mb-3"
            placeholder="Contraseña"
            [(ngModel)]="password"
          >

          <button
            class="btn btn-primary w-100"
            (click)="login()"
          >
            Iniciar sesión
          </button>

        </div>

      </div>

    </div>

  </div>

</div>

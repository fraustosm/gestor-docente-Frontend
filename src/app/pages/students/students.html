<div class="container mt-4">

  <h2>{{ group.name }}</h2>
  <p class="text-muted">Gestión de alumnos</p>

  <div class="card mb-4">

    <div class="card-body">

      <div class="row">

        <div class="col-md-8">

          <input
            class="form-control"
            placeholder="Nombre del alumno"
            [(ngModel)]="studentName"
          >

        </div>

        <div class="col-md-4">

          <button
            class="btn btn-success w-100"
            (click)="createStudent()"
          >
            Crear Alumno
          </button>

        </div>

      </div>

    </div>

  </div>

  <table class="table table-striped table-hover">

    <thead>

      <tr>

        <th>ID</th>

        <th>Nombre</th>

        <th>Asistencia</th>

        <th>Acciones</th>

      </tr>

    </thead>

    <tbody>

      @for(student of students; track student.id){

        <tr>

          <td>

            {{student.id}}

          </td>

          <td>

            {{student.name}}

          </td>

          <td>

            <button
              class="btn btn-success btn-sm me-2"
              (click)="registerAttendance(student.id, 'Present')"
            >
              Presente
            </button>

            <button
              class="btn btn-warning btn-sm"
              (click)="registerAttendance(student.id, 'Absent')"
            >
              Ausente
            </button>

          </td>

          <td>

            <a
              class="btn btn-primary btn-sm me-2"
              [routerLink]="['/grades', student.id]"
            >
              Calificaciones
            </a>

            <a
              class="btn btn-secondary btn-sm me-2"
              [routerLink]="['/reports', student.id]"
            >
              Reporte
            </a>

            <button
              class="btn btn-danger btn-sm"
              (click)="deleteStudent(student.id)"
            >
              Eliminar
            </button>

          </td>

        </tr>

      }

    </tbody>

  </table>

</div>
